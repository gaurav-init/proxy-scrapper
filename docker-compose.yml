services:
  app:
    build: .
    restart: always
    environment:
      - MONGO_URI=${MONGO_URI}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NODE_ENV=production
    expose:
      - "3000"

  cron:
    build: .
    restart: always
    command: node index.js
    environment:
      - MONGO_URI=${MONGO_URI}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NODE_ENV=production

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
