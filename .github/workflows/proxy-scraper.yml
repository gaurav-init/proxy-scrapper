name: Proxy Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run proxy scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scrape.js

      - name: Scan ports (SMTP + HTTP)
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node port-scan.js
